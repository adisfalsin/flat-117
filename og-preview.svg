<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1610"/>
      <stop offset="100%" style="stop-color:#0D0B08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="50%" style="stop-color:#E8C98A"/>
      <stop offset="100%" style="stop-color:#C9A96E"/>
    </linearGradient>
    <pattern id="deco" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="30" y1="0" x2="30" y2="60" stroke="#C9A96E" stroke-width="0.3" opacity="0.15"/>
      <line x1="0" y1="30" x2="60" y2="30" stroke="#C9A96E" stroke-width="0.3" opacity="0.15"/>
      <rect x="27" y="27" width="6" height="6" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.2" transform="rotate(45 30 30)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#deco)"/>

  <!-- Top gold bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>

  <!-- Bottom gold bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold)"/>

  <!-- Left ornamental bar -->
  <rect x="60" y="60" width="2" height="510" fill="#C9A96E" opacity="0.5"/>

  <!-- Right ornamental bar -->
  <rect x="1138" y="60" width="2" height="510" fill="#C9A96E" opacity="0.5"/>

  <!-- Top corner ornament left -->
  <line x1="60" y1="60" x2="120" y2="60" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="60" x2="60" y2="120" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>

  <!-- Top corner ornament right -->
  <line x1="1140" y1="60" x2="1080" y2="60" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>
  <line x1="1140" y1="60" x2="1140" y2="120" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>

  <!-- Bottom corner ornament left -->
  <line x1="60" y1="570" x2="120" y2="570" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="570" x2="60" y2="510" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>

  <!-- Bottom corner ornament right -->
  <line x1="1140" y1="570" x2="1080" y2="570" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>
  <line x1="1140" y1="570" x2="1140" y2="510" stroke="#C9A96E" stroke-width="2" opacity="0.5"/>

  <!-- Central diamond ornament top -->
  <polygon points="600,130 612,142 600,154 588,142" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.7"/>
  <circle cx="600" cy="142" r="2" fill="#C9A96E" opacity="0.7"/>

  <!-- Horizontal rules -->
  <line x1="100" y1="175" x2="1100" y2="175" stroke="#C9A96E" stroke-width="0.6" opacity="0.4"/>
  <line x1="100" y1="470" x2="1100" y2="470" stroke="#C9A96E" stroke-width="0.6" opacity="0.4"/>

  <!-- ASA ELECTRICAL LTD -->
  <text x="600" y="230" font-family="Georgia, serif" font-size="18" font-weight="normal" letter-spacing="12" fill="#C9A96E" text-anchor="middle" opacity="0.9">ASA ELECTRICAL LTD</text>

  <!-- Main heading: WORKS COMPLETE -->
  <text x="600" y="330" font-family="Georgia, serif" font-size="82" font-weight="normal" letter-spacing="4" fill="#F8F4EE" text-anchor="middle">WORKS COMPLETE</text>

  <!-- Subtitle -->
  <text x="600" y="390" font-family="Georgia, serif" font-size="22" font-weight="normal" letter-spacing="2" fill="#C9A96E" text-anchor="middle" font-style="italic">Flat 117, Nell Gwynn House</text>

  <!-- Address line -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="14" letter-spacing="4" fill="#8A7A65" text-anchor="middle">SLOANE AVENUE · CHELSEA · LONDON SW3</text>

  <!-- Bottom ref -->
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="12" letter-spacing="6" fill="#C9A96E" text-anchor="middle" opacity="0.6">CERTIFICATE OF COMPLETION</text>

  <!-- Small decorative dots -->
  <circle cx="540" cy="510" r="2" fill="#C9A96E" opacity="0.4"/>
  <circle cx="660" cy="510" r="2" fill="#C9A96E" opacity="0.4"/>
</svg>
